#!/usr/bin/env bash
# arch-bootstrap preset — Huawei MateBook D16 2021 (AMD Ryzen 5 4600H)
#
# Hardware:
#   CPU   AMD Ryzen 5 4600H (Renoir, integrated Radeon RX Vega 6)
#   RAM   16 GB
#   SSD   NVMe (select disk interactively at install time)
#
# Software stack:
#   DE    GNOME (Wayland / GDM)          — inherited from default
#   Audio PipeWire                        — inherited from default
#   Net   NetworkManager + BlueZ          — inherited from default

# System identity
HOSTNAME="matebook"

# Base packages — append AMD microcode to the default list
# Use += to extend the array from default.conf rather than replacing it.
BASE_PACKAGES+=(
    "amd-ucode"
)

# Disk partitioning
SWAP_TYPE="partition"
SWAP_SIZE="16G"

# Machine-specific packages — AMD open-source GPU stack
# All common packages (GNOME, audio, bluetooth, ufw, fwupd, …) come from
# default.conf and are already present in PACKAGES before this preset is
# sourced; we only append hardware-specific additions here.
PACKAGES+=(
    # GPU — AMD integrated (Vega 6, open-source stack)
    # hooks/amdgpu.sh adds amdgpu to mkinitcpio for early KMS.
    # Ref: https://wiki.archlinux.org/title/AMDGPU#Early_KMS_start
    "mesa:amdgpu"
    "vulkan-radeon"
    "libva-mesa-driver"

    # Power management — battery-powered laptop
    "power-profiles-daemon"
)

# Kernel parameters
KERNEL_PARAMS+=(
    # AMD Ryzen SMBus: the i2c-piix4 driver and ACPI both claim ownership of
    # the SMBus controller, causing i2c-8 SMBus Timeout errors that slow down
    # boot. Relaxing ACPI resource enforcement prevents the conflict.
    # Ref: https://wiki.archlinux.org/title/Laptop/Huawei
    "acpi_enforce_resources=lax"
    # AMD Renoir also uses i2c_designware for some buses; the driver attempts
    # a full bus reset that the hardware doesn't support, producing
    # "i2c-N: Failed to reset at end of transaction" errors at boot.
    # Ref: https://bugzilla.kernel.org/show_bug.cgi?id=196497
    "i2c_designware.ignore_bus_quirks=1"
)

# Sleep / hibernate
# Hibernate automatically after 4 hours of suspend.
# Configures HibernateDelaySec, the systemd-suspend symlink, logind lid
# behaviour, and GNOME idle/sleep dconf settings (via chroot/modules/08-sleep.sh).
HIBERNATE_DELAY="4h"
