#!/usr/bin/env bash
# arch-bootstrap preset — Desktop workstation
#
# Hardware:
#   Motherboard  Gigabyte B550 AORUS Elite V2 Rev. 1.2
#   CPU          AMD Ryzen 7 5800X3D
#   GPU          Nvidia GeForce RTX 4070 Ti (nvidia-open, early KMS)
#   RAM          32 GB DDR4
#   Wi-Fi/BT     ASUS PCE-AXE59BT (MediaTek MT7922, PCIe)
#                Driver: mt7921e (in-kernel since 5.12); firmware: linux-firmware
#
# Software stack:
#   DE    GNOME (Wayland / GDM)          — inherited from default
#   Audio PipeWire                        — inherited from default
#   Net   NetworkManager + BlueZ          — inherited from default

# System identity
HOSTNAME="station"

# Base packages — append AMD microcode to the default list
# Use += to extend the array from default.conf rather than replacing it.
BASE_PACKAGES+=(
    "amd-ucode"
)

# Machine-specific packages
# All common packages (GNOME, audio, bluetooth, ufw, fwupd, …) come from
# default.conf and are already present in PACKAGES before this preset is
# sourced; we only append hardware-specific additions here.
PACKAGES+=(
    # GPU — Nvidia RTX 4070 Ti, open-source kernel modules
    # hooks/nvidia-open.sh adds nvidia modules to mkinitcpio for early loading.
    # nvidia-utils (Wayland EGL, NVENC/NVDEC, etc.) is a dependency of nvidia-open.
    # Ref: https://wiki.archlinux.org/title/NVIDIA#Installation
    "nvidia-open:nvidia-open"
)

# Kernel parameters — NVIDIA DRM kernel mode setting
# nvidia_drm.modeset=1  — required for Wayland / GDM
# nvidia_drm.fbdev=1    — use the NVIDIA framebuffer instead of simpledrm/efifb
# Ref: https://wiki.archlinux.org/title/NVIDIA#DRM_kernel_mode_setting
KERNEL_PARAMS+=(
    "nvidia_drm.modeset=1"
    "nvidia_drm.fbdev=1"
)
