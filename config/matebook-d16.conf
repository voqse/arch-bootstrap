#!/usr/bin/env bash
# =============================================================================
# arch-bootstrap preset — Huawei MateBook D16 2021 (AMD Ryzen 5 4600H)
#
# Hardware:
#   CPU   AMD Ryzen 5 4600H (Renoir, integrated Radeon RX Vega 6)
#   RAM   16 GB
#   SSD   NVMe (select disk interactively at install time)
#
# Software stack:
#   DE    GNOME (Wayland / GDM)          — inherited from default
#   Audio PipeWire                        — inherited from default
#   Net   NetworkManager + BlueZ          — inherited from default
# =============================================================================

# -----------------------------------------------------------------------------
# System identity
# -----------------------------------------------------------------------------
HOSTNAME="matebook"

# -----------------------------------------------------------------------------
# Base packages — adds AMD microcode for Ryzen CPUs on top of default
# -----------------------------------------------------------------------------
BASE_PACKAGES=(
    "base"
    "base-devel"
    "linux"
    "linux-firmware"
    "amd-ucode"
)

# -----------------------------------------------------------------------------
# Disk partitioning
# -----------------------------------------------------------------------------
SWAP_TYPE="partition"
SWAP_SIZE="16G"

# -----------------------------------------------------------------------------
# Machine-specific packages — AMD open-source GPU stack
# All common packages (GNOME, audio, bluetooth, ufw, fwupd, …) come from
# default.conf and are already present in PACKAGES before this preset is
# sourced; we only append hardware-specific additions here.
# -----------------------------------------------------------------------------
PACKAGES+=(
    # GPU — AMD integrated (Vega 6, open-source stack)
    "mesa"
    "vulkan-radeon"
    "libva-mesa-driver"

    # Power management — battery-powered laptop
    "power-profiles-daemon"
)

# -----------------------------------------------------------------------------
# Services — enable power-profiles-daemon for battery management
# -----------------------------------------------------------------------------
SERVICES+=(
    "power-profiles-daemon"
)

# -----------------------------------------------------------------------------
# Sleep / hibernate
# Hibernate automatically after 4 hours of suspend.
# Configures HibernateDelaySec and suspend-then-hibernate via logind.
# -----------------------------------------------------------------------------
HIBERNATE_DELAY="4h"
