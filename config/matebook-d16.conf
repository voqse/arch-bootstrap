#!/usr/bin/env bash
# =============================================================================
# arch-bootstrap preset — Huawei MateBook D16 2021 (AMD Ryzen 5 4600H)
#
# Hardware:
#   CPU   AMD Ryzen 5 4600H (Renoir, integrated Radeon RX Vega 6)
#   RAM   16 GB
#   SSD   NVMe (select disk interactively)
#
# Software stack:
#   DE    GNOME (Wayland via GDM)
#   Audio PipeWire
#   Net   NetworkManager
#   BT    BlueZ
# =============================================================================

# -----------------------------------------------------------------------------
# Localization
# -----------------------------------------------------------------------------
LOCALES=("en_US.UTF-8" "ru_RU.UTF-8")
LANG="en_US.UTF-8"
KEYMAP="ruwin_alt_sh-UTF-8"
FONT="cyr-sun16"
TIMEZONE="Asia/Tomsk"
NTP_ENABLED=true

# -----------------------------------------------------------------------------
# Disk partitioning
# Leave DISK empty to select interactively at runtime.
# -----------------------------------------------------------------------------
DISK=""
USE_SWAP=true
SWAP_SIZE="16G"

# -----------------------------------------------------------------------------
# System identity
# -----------------------------------------------------------------------------
HOSTNAME="matebook"

# -----------------------------------------------------------------------------
# User accounts
# Password "?" — will be prompted interactively during installation.
# -----------------------------------------------------------------------------
USERS=(
    "voqse:?:wheel,audio,video,storage,optical"
)

# Root account is locked; use sudo via the wheel group.
ROOT_PASSWORD=""

# -----------------------------------------------------------------------------
# Mirrors
# -----------------------------------------------------------------------------
MIRROR_COUNTRY="Russia"

# -----------------------------------------------------------------------------
# Base packages (always installed first via pacstrap)
# -----------------------------------------------------------------------------
BASE_PACKAGES=(
    "base"
    "base-devel"
    "linux"
    "linux-firmware"
    "amd-ucode"
)

# -----------------------------------------------------------------------------
# Packages
# Format: "package_name" or "package_name:hook_script"
# Hook scripts live in hooks/ and run inside arch-chroot after all packages
# are installed.
# -----------------------------------------------------------------------------
PACKAGES=(
    # Editor
    "nano"
    "neovim"

    # Privilege escalation
    "sudo"

    # Network
    "networkmanager"

    # Bluetooth
    "bluez"
    "bluez-utils"

    # Audio (PipeWire stack)
    "pipewire"
    "pipewire-pulse"
    "wireplumber"

    # GPU — AMD integrated (Vega 6 / RDNA1)
    "mesa"
    "vulkan-radeon"
    "libva-mesa-driver"

    # Display manager + GNOME shell
    "gdm"
    "gnome-shell:gnome-appearance"
    "gnome-control-center"
    "nautilus"
    "gnome-keyring"
    "gnome-console"
    "xdg-user-dirs-gtk"

    # Power management
    "power-profiles-daemon"

    # Firewall
    "ufw:ufw"

    # Firmware updates
    "fwupd"

    # Browser
    "firefox"
)

# -----------------------------------------------------------------------------
# Bootloader — GRUB (UEFI)
# Boots immediately into the installed system with no menu shown.
# Displayed as "Linux Boot Manager" in the EFI firmware boot menu.
# -----------------------------------------------------------------------------
BOOTLOADER="grub"
BOOTLOADER_PACKAGES=(
    "grub"
    "efibootmgr"
)

GRUB_BOOTLOADER_ID="Linux Boot Manager"
GRUB_TIMEOUT=0
GRUB_TIMEOUT_STYLE="hidden"
GRUB_DISABLE_OS_PROBER=true

# -----------------------------------------------------------------------------
# Services to enable (systemctl enable)
# -----------------------------------------------------------------------------
SERVICES=(
    "NetworkManager"
    "bluetooth"
    "gdm"
    "power-profiles-daemon"
    "fstrim.timer"
    "fwupd-refresh.timer"
    "ufw"
)
