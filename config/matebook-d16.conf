#!/usr/bin/env bash
# =============================================================================
# arch-bootstrap preset — Huawei MateBook D16 2021 (AMD Ryzen 5 4600H)
#
# Hardware:
#   CPU   AMD Ryzen 5 4600H (Renoir, integrated Radeon RX Vega 6)
#   RAM   16 GB
#   SSD   NVMe (select disk interactively at install time)
#
# Software stack:
#   DE    GNOME (Wayland / GDM)
#   Audio PipeWire
#   Net   NetworkManager + BlueZ
# =============================================================================

# -----------------------------------------------------------------------------
# System identity
# -----------------------------------------------------------------------------
HOSTNAME="matebook"

# -----------------------------------------------------------------------------
# Base packages — includes AMD microcode for Ryzen CPUs
# -----------------------------------------------------------------------------
BASE_PACKAGES=(
    "base"
    "base-devel"
    "linux"
    "linux-firmware"
    "amd-ucode"
)

# -----------------------------------------------------------------------------
# Packages
# hooks/gnome-shell.sh applies GNOME appearance settings (black background).
# hooks/ufw.sh configures firewall rules (deny in / allow out).
# -----------------------------------------------------------------------------
PACKAGES=(
    # Editors
    "nano"
    "neovim"

    # Privilege escalation
    "sudo"

    # Network
    "networkmanager"

    # Bluetooth
    "bluez"
    "bluez-utils"

    # Audio (PipeWire stack)
    "pipewire"
    "pipewire-pulse"
    "wireplumber"

    # GPU — AMD integrated (Vega 6, open-source stack)
    "mesa"
    "vulkan-radeon"
    "libva-mesa-driver"

    # Display manager + GNOME shell
    # hooks/gnome-shell.sh runs automatically (same name as package)
    "gdm"
    "gnome-shell"
    "gnome-control-center"
    "nautilus"
    "gnome-keyring"
    "gnome-console"
    "xdg-user-dirs-gtk"

    # Power management
    "power-profiles-daemon"

    # Firewall — hooks/ufw.sh: deny incoming, allow outgoing
    "ufw:ufw"

    # Firmware updates
    "fwupd"

    # Browser
    "firefox"
)

# -----------------------------------------------------------------------------
# Services to enable
# -----------------------------------------------------------------------------
SERVICES=(
    "NetworkManager"
    "bluetooth"
    "gdm"
    "power-profiles-daemon"
    "fstrim.timer"
    "fwupd-refresh.timer"
    "ufw"
)
