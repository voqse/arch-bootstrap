#!/usr/bin/env bash
# =============================================================================
# arch-bootstrap default configuration preset
# Copy this file, adjust values, and pass it to bootstrap.sh:
#   bash bootstrap.sh --config /path/to/my.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Localization
# -----------------------------------------------------------------------------
LOCALES=("en_US.UTF-8" "ru_RU.UTF-8")
LANG="en_US.UTF-8"
KEYMAP="ruwin_alt_sh-UTF-8"
FONT="cyr-sun16"
# X11 keyboard layout consumed by GDM (and Xorg/Wayland sessions).
# GDM ignores the console KEYMAP above; it reads XKBLAYOUT from vconsole.conf.
# Ref: https://wiki.archlinux.org/title/GDM#Keyboard_layout
XKBLAYOUT="us,ru"
XKBOPTIONS="grp:alt_shift_toggle"

# -----------------------------------------------------------------------------
# Disk partitioning
# Set DISK to a device path (e.g. /dev/sda, /dev/nvme0n1) to skip interactive
# selection, or leave empty to be prompted at runtime.
#
# SWAP_TYPE: "file"      — create a swapfile at /swap/swapfile (default)
#            "partition" — create a dedicated swap partition
#            "none"      — no swap
# -----------------------------------------------------------------------------
DISK=""
SWAP_TYPE="file"
SWAP_SIZE="16G"

# -----------------------------------------------------------------------------
# System identity
# -----------------------------------------------------------------------------
HOSTNAME="archlinux"

# Note: username, user password, and root password are always collected
# interactively at the start of bootstrap.sh. They are never defined in
# preset files; they are serialised into the chroot config at runtime.

# -----------------------------------------------------------------------------
# Packages
# Each entry is a package name optionally followed by a post-install
# configuration script (relative to hooks/).
# Format: "package_name[:hook_script]"
# If hooks/<package_name>.sh exists it is run automatically even without the
# explicit ":hook" suffix.
#
# In preset files, extend these arrays with += rather than redefining them,
# so that default packages are preserved:
#   BASE_PACKAGES+=("amd-ucode")
#   PACKAGES+=("mesa" "vulkan-radeon")
# -----------------------------------------------------------------------------
BASE_PACKAGES=(
    "base"
    "base-devel"
    "linux"
    "linux-firmware"
)

PACKAGES=(
    # Editors
    "nano"
    "neovim"
    "vim"

    # Utilities
    "openssh"
    "git"
    "sudo"
    "reflector"
    "bash-completion"
    "man-db"
    "man-pages"
    "texinfo"

    # Network
    "networkmanager"
    # iwd provides WPA3-SAE support and is used as NetworkManager's Wi-Fi backend
    "iwd"

    # Bluetooth
    "bluez"
    "bluez-utils"

    # Audio (PipeWire stack)
    "pipewire"
    "pipewire-pulse"
    "wireplumber"

    # Display manager + GNOME shell
    # hooks/gnome-shell.sh runs automatically (same name as package)
    "gdm"
    "gnome-shell"
    "gnome-control-center"
    "nautilus"
    "gnome-keyring"
    "gnome-console"
    "seahorse"
    "xdg-user-dirs-gtk"
    # AppIndicator/KStatusNotifierItem tray icon support for GNOME Shell
    "gnome-shell-extension-appindicator"

    # Power management
    # (moved to machine-specific presets for battery-powered devices)

    # Firewall — hooks/ufw.sh: deny incoming, allow outgoing
    "ufw:ufw"
    "gufw"

    # Firmware updates
    "fwupd"

    # Onboard audio firmware (Sound Open Firmware — required on most modern
    # Intel and AMD systems for onboard audio that is not covered by linux-firmware)
    # Ref: https://wiki.archlinux.org/title/Installation_guide#Install_essential_packages
    "sof-firmware"

    # System monitor
    "btop"

    # Browser
    "firefox"

    # Boot splash
    "plymouth"

    # Container runtime — hooks/docker.sh adds the user to the docker group,
    # which grants access to the privileged Docker socket and is effectively
    # root-equivalent on the host.
    # docker-compose provides the standalone Compose v2 command.
    # Ref: https://wiki.archlinux.org/title/Docker
    "docker"
    "docker-compose"
)

# -----------------------------------------------------------------------------
# AUR helper — yay
# Packages to install from the AUR via yay after the main installation.
# -----------------------------------------------------------------------------
YAY_PACKAGES=(
    "google-chrome"
)

# -----------------------------------------------------------------------------
# Kernel parameters
# Extra parameters appended to the kernel command line.
# In preset files, extend with += to preserve defaults:
#   KERNEL_PARAMS+=("nvidia_drm.modeset=1")
# -----------------------------------------------------------------------------
KERNEL_PARAMS=()

# -----------------------------------------------------------------------------
# Bootloader — systemd-boot
# EFI_MOUNTPOINT: where the ESP is mounted (default: /boot)
# -----------------------------------------------------------------------------
EFI_MOUNTPOINT="/boot"

# -----------------------------------------------------------------------------
# Services
# Each entry is passed to: systemctl enable <unit>
# -----------------------------------------------------------------------------
SERVICES=(
    "NetworkManager"
    "bluetooth"
    "gdm"
    "fstrim.timer"
    # fwupd-refresh.timer: periodically refreshes LVFS firmware metadata so that
    # fwupdmgr get-updates can detect available firmware updates automatically.
    # Without it users must run `fwupdmgr refresh` manually before checking updates.
    "fwupd-refresh.timer"
    "ufw"
    # docker.socket activates the Docker daemon on first use (socket-activated).
    # Ref: https://wiki.archlinux.org/title/Docker#Installation
    "docker.socket"
)

# -----------------------------------------------------------------------------
# Sleep / hibernate
# Set to a systemd timespan (e.g. "4h") to enable suspend-then-hibernate:
# the system will suspend normally and hibernate after this delay.
# Leave empty to keep standard suspend behaviour.
# -----------------------------------------------------------------------------
HIBERNATE_DELAY=""
