#!/usr/bin/env bash
# =============================================================================
# arch-bootstrap default configuration preset
# Copy this file, adjust values, and pass it to bootstrap.sh:
#   bash bootstrap.sh --config /path/to/my.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Localization
# -----------------------------------------------------------------------------
LOCALES=("en_US.UTF-8" "ru_RU.UTF-8")
LANG="en_US.UTF-8"
KEYMAP="ruwin_alt_sh-UTF-8"
FONT="cyr-sun16"
TIMEZONE="Europe/Moscow"

# -----------------------------------------------------------------------------
# Disk partitioning
# Set DISK to a device path (e.g. /dev/sda, /dev/nvme0n1) to skip interactive
# selection, or leave empty to be prompted at runtime.
# -----------------------------------------------------------------------------
DISK=""
USE_SWAP=true
SWAP_SIZE="16G"

# -----------------------------------------------------------------------------
# System identity
# -----------------------------------------------------------------------------
HOSTNAME="archlinux"

# -----------------------------------------------------------------------------
# User accounts
# Each entry: "username:password:groups"
# Groups is a comma-separated list; leave empty for no extra groups.
# Example: "alice:secret:wheel,audio,video"
# -----------------------------------------------------------------------------
USERS=(
    "user::wheel,audio,video,storage"
)

# Root password (leave empty to lock the root account)
ROOT_PASSWORD=""

# -----------------------------------------------------------------------------
# Mirrors
# Leave empty to use reflector auto-selection, or list explicit mirror URLs.
# -----------------------------------------------------------------------------
MIRROR_COUNTRY="Russia"
# MIRRORS=(
#     "https://mirror.yandex.ru/archlinux/$repo/os/$arch"
# )

# -----------------------------------------------------------------------------
# Packages
# Each entry is a package name optionally followed by a post-install hook
# script path (relative to the hooks/ directory).
# Format: "package_name[:hook_script]"
# -----------------------------------------------------------------------------
BASE_PACKAGES=(
    "base"
    "base-devel"
    "linux"
    "linux-firmware"
)

PACKAGES=(
    "networkmanager:networkmanager"
    "openssh"
    "vim"
    "git"
    "sudo"
    "reflector"
    "bash-completion"
)

# -----------------------------------------------------------------------------
# Bootloader
# Supported: "grub"
# -----------------------------------------------------------------------------
BOOTLOADER="grub"
BOOTLOADER_PACKAGES=(
    "grub"
    "efibootmgr"
    "os-prober"
)
