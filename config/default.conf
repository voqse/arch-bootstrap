#!/usr/bin/env bash
# =============================================================================
# arch-bootstrap default configuration preset
# Copy this file, adjust values, and pass it to bootstrap.sh:
#   bash bootstrap.sh --config /path/to/my.conf
# =============================================================================

# -----------------------------------------------------------------------------
# Localization
# -----------------------------------------------------------------------------
LOCALES=("en_US.UTF-8" "ru_RU.UTF-8")
LANG="en_US.UTF-8"
KEYMAP="ruwin_alt_sh-UTF-8"
FONT="cyr-sun16"

# -----------------------------------------------------------------------------
# Disk partitioning
# Set DISK to a device path (e.g. /dev/sda, /dev/nvme0n1) to skip interactive
# selection, or leave empty to be prompted at runtime.
#
# SWAP_TYPE: "file"      — create a swapfile at /swap/swapfile (default)
#            "partition" — create a dedicated swap partition
#            "none"      — no swap
# -----------------------------------------------------------------------------
DISK=""
SWAP_TYPE="file"
SWAP_SIZE="16G"

# -----------------------------------------------------------------------------
# System identity
# -----------------------------------------------------------------------------
HOSTNAME="archlinux"

# Note: username, user password, and root password are always collected
# interactively at the start of bootstrap.sh. They are never defined in
# preset files; they are serialised into the chroot config at runtime.

# -----------------------------------------------------------------------------
# Packages
# Each entry is a package name optionally followed by a post-install
# configuration script (relative to hooks/).
# Format: "package_name[:hook_script]"
# If hooks/<package_name>.sh exists it is run automatically even without the
# explicit ":hook" suffix.
# -----------------------------------------------------------------------------
BASE_PACKAGES=(
    "base"
    "base-devel"
    "linux"
    "linux-firmware"
)

PACKAGES=(
    # Editors
    "nano"
    "neovim"
    "vim"

    # Utilities
    "openssh"
    "git"
    "sudo"
    "reflector"
    "bash-completion"

    # Network
    "networkmanager"

    # Bluetooth
    "bluez"
    "bluez-utils"

    # Audio (PipeWire stack)
    "pipewire"
    "pipewire-pulse"
    "wireplumber"

    # Display manager + GNOME shell
    # hooks/gnome-shell.sh runs automatically (same name as package)
    "gdm"
    "gnome-shell"
    "gnome-control-center"
    "nautilus"
    "gnome-keyring"
    "gnome-console"
    "xdg-user-dirs-gtk"

    # Power management
    # (moved to machine-specific presets for battery-powered devices)

    # Firewall — hooks/ufw.sh: deny incoming, allow outgoing
    "ufw:ufw"
    "gufw"

    # Firmware updates
    "fwupd"

    # Browser
    "firefox"

    # Boot splash
    "plymouth"
)

# -----------------------------------------------------------------------------
# AUR helper — yay
# Packages to install from the AUR via yay after the main installation.
# -----------------------------------------------------------------------------
YAY_PACKAGES=(
    "google-chrome"
    "webstorm"
)

# -----------------------------------------------------------------------------
# Bootloader
# Supported: "systemd-boot" (default), "grub"
# EFI_MOUNTPOINT: where the ESP is mounted (default: /boot)
# -----------------------------------------------------------------------------
BOOTLOADER="systemd-boot"
BOOTLOADER_PACKAGES=(
    "efibootmgr"
)
EFI_MOUNTPOINT="/boot"

# -----------------------------------------------------------------------------
# Services
# Each entry is passed to: systemctl enable <unit>
# -----------------------------------------------------------------------------
SERVICES=(
    "NetworkManager"
    "bluetooth"
    "gdm"
    "fstrim.timer"
    "fwupd-refresh.timer"
    "ufw"
)

# -----------------------------------------------------------------------------
# Sleep / hibernate
# Set to a systemd timespan (e.g. "4h") to enable suspend-then-hibernate:
# the system will suspend normally and hibernate after this delay.
# Leave empty to keep standard suspend behaviour.
# -----------------------------------------------------------------------------
HIBERNATE_DELAY=""
